version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fileshare-network

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/fileshare
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-fileshare-uploads}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT:-http://minio:9000}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - MAX_FILE_SIZE=5368709120
      - CHUNK_SIZE=5242880
      - UPLOAD_EXPIRY_HOURS=24
      - APP_URL=${APP_URL:-http://localhost}
    depends_on:
      - mongodb
      - redis
      - minio
    networks:
      - fileshare-network

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fileshare-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - fileshare-network

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fileshare-network

networks:
  fileshare-network:
    driver: bridge

volumes:
  mongodb_data:
  minio_data:
